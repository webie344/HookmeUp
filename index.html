<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HookMeUp</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
color:white;
overflow:hidden;
background:linear-gradient(120deg,#020617,#0f172a,#020617);
background-size:400% 400%;
animation:bgMove 12s ease infinite;
}

/* moving gradient background */
@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.container{
text-align:center;
padding:20px;
width:100%;
max-width:420px;
}

/* logo */
.logo{
width:120px;
margin:auto;
margin-bottom:20px;
animation:float 4s ease-in-out infinite;
}

@keyframes float{
0%{transform:translateY(0px);}
50%{transform:translateY(-10px);}
100%{transform:translateY(0px);}
}

h1{
font-size:40px;
font-weight:bold;
margin-bottom:10px;
}

h1 span{
color:#ff3c7f;
}

.tagline{
font-size:26px;
font-weight:600;
margin-bottom:10px;
}

.tagline span{
color:#ff3c7f;
}

.sub{
font-size:15px;
opacity:0.8;
margin-bottom:40px;
}

/* button */
.btn{
display:block;
width:100%;
padding:16px;
border-radius:40px;
border:none;
font-size:18px;
font-weight:bold;
color:white;
cursor:pointer;
background:linear-gradient(45deg,#ff4d6d,#ff2e9f);
box-shadow:0 0 20px rgba(255,60,120,0.6);
transition:0.3s;
animation:pulse 2.5s infinite;
  margin-top:90px;
}

.btn:hover{
transform:scale(1.05);
}

@keyframes pulse{
0%{box-shadow:0 0 10px rgba(255,60,120,0.4);}
50%{box-shadow:0 0 25px rgba(255,60,120,0.9);}
100%{box-shadow:0 0 10px rgba(255,60,120,0.4);}
}

</style>
</head>

<body>

<div class="container">

<img src="logo.png" class="logo">

<h1>hook<span>meup</span></h1>

<div class="tagline">
Hook Up, Meet and <span>Chat</span>
</div>

<div class="sub">
Find fun encounters near you quickly and easily
</div>

<button class="btn" id="startBtn">Get Started</button>

</div>

<script>

document.getElementById("startBtn").onclick=function(){
window.location.href="login.html";
};

</script>

</body>
</html>
