<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details - Bondbase</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #14141f;
            --bg-card: #1a1a2a;
            --text-primary: #ffffff;
            --text-secondary: #b0b0c0;
            --primary: #ff2a6d;
            --primary-dark: #d91a5c;
            --secondary: #7a4fff;
            --success: #00ff88;
            --warning: #ffd166;
            --danger: #ff6b6b;
            --border: #2a2a3a;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding-top: 20px;
        }

        /* Main Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 30px;
        }

        /* Back Button */
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            text-decoration: none;
            margin-bottom: 20px;
            padding: 8px 16px;
            background: var(--bg-card);
            border-radius: 20px;
            border: 1px solid var(--border);
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
            transform: translateX(-5px);
        }

        /* Product Layout */
        .product-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            background: var(--bg-card);
            border-radius: 24px;
            padding: 30px;
            border: 1px solid var(--border);
            margin-bottom: 30px;
        }

        /* Image Gallery */
        .image-gallery {
            position: relative;
        }

        .main-image {
            width: 100%;
            height: 400px;
            object-fit: cover;
            border-radius: 16px;
            border: 1px solid var(--border);
            background: var(--bg-secondary);
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .main-image:hover {
            transform: scale(1.02);
        }

        .thumbnail-container {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            overflow-x: auto;
            padding-bottom: 5px;
        }

        .thumbnail {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 8px;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.3s ease;
            background: var(--bg-secondary);
        }

        .thumbnail:hover, .thumbnail.active {
            border-color: var(--primary);
            transform: scale(1.05);
        }

        .cloudinary-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(52, 72, 197, 0.9);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 5px;
            z-index: 10;
        }

        /* Product Info */
        .product-info {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .store-info {
            display: flex;
            align-items: center;
            gap: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
        }

        .store-avatar {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            object-fit: cover;
            background: var(--bg-secondary);
            border: 2px solid var(--primary);
        }

        .store-details {
            flex: 1;
        }

        .store-name {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .store-name a {
            color: var(--text-primary);
            text-decoration: none;
        }

        .store-name a:hover {
            color: var(--primary);
        }

        .store-verified {
            background: var(--primary);
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 500;
        }

        .store-rating {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-top: 5px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .store-rating i {
            color: #ffd700;
        }

        .product-name {
            font-size: 28px;
            font-weight: 700;
            line-height: 1.3;
        }

        .product-meta {
            display: flex;
            gap: 20px;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .product-meta i {
            color: var(--primary);
            margin-right: 5px;
        }

        .product-price {
            background: var(--bg-secondary);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid var(--border);
        }

        .price-row {
            display: flex;
            align-items: baseline;
            gap: 15px;
            flex-wrap: wrap;
        }

        .current-price {
            font-size: 36px;
            font-weight: 800;
            color: var(--primary);
        }

        .original-price {
            font-size: 20px;
            color: var(--text-secondary);
            text-decoration: line-through;
        }

        .discount-badge {
            background: var(--success);
            color: black;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 14px;
        }

        .currency-badge {
            display: inline-block;
            background: var(--bg-card);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            color: var(--text-secondary);
            border: 1px solid var(--border);
            margin-left: 10px;
        }

        .stock-status {
            margin-top: 10px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .in-stock {
            color: var(--success);
        }

        .out-of-stock {
            color: var(--danger);
        }

        /* Product Features */
        .features-section {
            background: var(--bg-secondary);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid var(--border);
        }

        .features-title {
            font-size: 18px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .features-title i {
            color: var(--primary);
        }

        .features-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .feature-item {
            background: var(--bg-card);
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid var(--border);
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .feature-item i {
            color: var(--primary);
            font-size: 12px;
        }

        /* Product Description */
        .description-section {
            background: var(--bg-secondary);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid var(--border);
        }

        .description-title {
            font-size: 18px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .description-title i {
            color: var(--primary);
        }

        .description-text {
            color: var(--text-secondary);
            line-height: 1.6;
            white-space: pre-line;
        }

        /* Contact Seller Section */
        .contact-section {
            background: linear-gradient(135deg, rgba(255, 42, 109, 0.1), rgba(122, 79, 255, 0.1));
            padding: 20px;
            border-radius: 16px;
            border: 1px solid var(--primary);
            margin-top: 10px;
        }

        .contact-title {
            font-size: 18px;
            margin-bottom: 15px;
            color: var(--primary);
        }

        .contact-buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .contact-btn {
            flex: 1;
            min-width: 150px;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s ease;
            text-decoration: none;
            color: white;
        }

        .contact-btn.whatsapp {
            background: linear-gradient(135deg, #25D366, #128C7E);
        }

        .contact-btn.telegram {
            background: linear-gradient(135deg, #0088cc, #0077b5);
        }

        .contact-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        /* Seller Info */
        .seller-section {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid var(--border);
            margin-top: 20px;
        }

        .seller-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .seller-avatar-large {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--primary);
        }

        .seller-name-large {
            font-size: 18px;
            font-weight: 600;
        }

        .seller-joined {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .seller-stats {
            display: flex;
            gap: 20px;
            padding: 15px 0;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
        }

        .seller-stat {
            text-align: center;
            flex: 1;
        }

        .stat-value {
            font-size: 18px;
            font-weight: 700;
            color: var(--primary);
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .view-store-btn {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 1px solid var(--primary);
            border-radius: 12px;
            color: var(--primary);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 15px;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .view-store-btn:hover {
            background: var(--primary);
            color: white;
        }

        /* Seller Products Preview */
        .seller-products-preview {
            margin-top: 20px;
        }

        .preview-title {
            font-size: 16px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
        }

        .preview-title i {
            color: var(--primary);
        }

        .preview-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .preview-item {
            background: var(--bg-secondary);
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid var(--border);
        }

        .preview-item:hover {
            transform: translateY(-2px);
            border-color: var(--primary);
        }

        .preview-image {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
        }

        .preview-name {
            padding: 5px;
            font-size: 11px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-align: center;
        }

        .preview-price {
            font-size: 10px;
            color: var(--primary);
            text-align: center;
            padding-bottom: 5px;
        }

        /* Related Products */
        .related-section {
            margin-top: 40px;
        }

        .related-title {
            font-size: 22px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .related-title i {
            color: var(--primary);
        }

        .related-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
        }

        .related-card {
            background: var(--bg-card);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .related-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 10px 20px rgba(255, 42, 109, 0.2);
        }

        .related-image {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
        }

        .related-info {
            padding: 12px;
        }

        .related-name {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 5px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .related-price {
            font-size: 16px;
            font-weight: 700;
            color: var(--primary);
        }

        .related-currency {
            font-size: 10px;
            color: var(--text-secondary);
            margin-left: 4px;
        }

        /* Loading State */
        .loading-skeleton {
            background: var(--bg-card);
            border-radius: 24px;
            padding: 30px;
            border: 1px solid var(--border);
        }

        .skeleton-image {
            width: 100%;
            height: 400px;
            background: linear-gradient(90deg, var(--bg-secondary) 25%, var(--bg-card) 50%, var(--bg-secondary) 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
            border-radius: 16px;
        }

        .skeleton-text {
            height: 20px;
            background: var(--bg-secondary);
            margin: 10px 0;
            border-radius: 4px;
            animation: loading 1.5s infinite;
        }

        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* Modal for image zoom */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-image {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            border-radius: 8px;
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            color: white;
            font-size: 30px;
            cursor: pointer;
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .modal-close:hover {
            background: var(--danger);
            transform: rotate(90deg);
        }

        .modal-prev, .modal-next {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            color: white;
            font-size: 30px;
            cursor: pointer;
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .modal-prev {
            left: 20px;
        }

        .modal-next {
            right: 20px;
        }

        .modal-prev:hover, .modal-next:hover {
            background: var(--primary);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .product-container {
                grid-template-columns: 1fr;
            }
            
            .main-image {
                height: 300px;
            }
            
            .contact-buttons {
                flex-direction: column;
            }

            .container {
                padding: 0 15px;
            }

            .preview-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 480px) {
            .seller-stats {
                flex-direction: column;
                gap: 10px;
            }
            
            .seller-stat {
                text-align: left;
                display: flex;
                align-items: center;
                gap: 10px;
            }
            
            .stat-value {
                min-width: 40px;
            }
        }
    </style>
</head>
<body>
    <!-- Main Container -->
    <div class="container">
        <!-- Back Button -->
        <a href="market.html" class="back-btn" id="backBtn">
            <i class="fas fa-arrow-left"></i> Back to Marketplace
        </a>

        <!-- Product Content -->
        <div id="productContent"></div>
    </div>

    <!-- Image Zoom Modal -->
    <div class="modal" id="imageModal">
        <span class="modal-close" id="modalClose">&times;</span>
        <span class="modal-prev" id="modalPrev"><i class="fas fa-chevron-left"></i></span>
        <span class="modal-next" id="modalNext"><i class="fas fa-chevron-right"></i></span>
        <img class="modal-image" id="modalImage" src="" alt="Zoomed Image">
    </div>

    <!-- Firebase Scripts -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { 
            getFirestore, 
            doc, 
            getDoc, 
            collection, 
            query, 
            where, 
            getDocs, 
            limit 
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyC9jF-ocy6HjsVzWVVlAyXW-4aIFgA79-A",
            authDomain: "crypto-6517d.firebaseapp.com",
            projectId: "crypto-6517d",
            storageBucket: "crypto-6517d.firebasestorage.app",
            messagingSenderId: "60263975159",
            appId: "1:60263975159:web:bd53dcaad86d6ed9592bf2"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // DOM Elements
        const productContent = document.getElementById('productContent');
        const backBtn = document.getElementById('backBtn');

        // Modal Elements
        const modal = document.getElementById('imageModal');
        const modalImage = document.getElementById('modalImage');
        const modalClose = document.getElementById('modalClose');
        const modalPrev = document.getElementById('modalPrev');
        const modalNext = document.getElementById('modalNext');

        // State
        let currentUser = null;
        let currentProduct = null;
        let currentImageIndex = 0;
        let productImages = [];
        let sellerProducts = [];

        // Currency symbols mapping
        const currencySymbols = {
            USD: '$',
            NGN: '₦',
            GBP: '£'
        };

        // Get product ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');

        if (!productId) {
            window.location.href = 'market.html';
        }

        // Check authentication
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
            }
            loadProduct();
        });

        // Helper function to get image URL from various formats
        function getImageUrl(image) {
            if (!image) return 'images/default-product.jpg';
            
            if (typeof image === 'string') {
                if (image.startsWith('http') || image.startsWith('/') || image.startsWith('./')) {
                    return image;
                }
                return 'images/default-product.jpg';
            }
            
            if (typeof image === 'object') {
                if (image.thumbnail) return image.thumbnail;
                if (image.url) return image.url;
                if (image.secure_url) return image.secure_url;
            }
            
            return 'images/default-product.jpg';
        }

        // Helper function to get store logo
        function getStoreLogo(store) {
            if (!store) return 'images/default-store.jpg';
            
            if (store.logo) {
                if (typeof store.logo === 'string') return store.logo;
                if (store.logo.url) return store.logo.url;
                if (store.logo.thumbnail) return store.logo.thumbnail;
            }
            
            if (store.logoThumbnail) return store.logoThumbnail;
            
            if (store.image) {
                if (typeof store.image === 'string') return store.image;
                if (store.image.url) return store.image.url;
            }
            
            return 'images/default-store.jpg';
        }

        // Helper function to get seller avatar
        function getAvatarUrl(seller) {
            if (!seller) return 'images/default-avatar.jpg';
            
            if (seller.photoURL) return seller.photoURL;
            if (seller.avatar) return seller.avatar;
            if (seller.profilePicture) return seller.profilePicture;
            
            return 'images/default-avatar.jpg';
        }

        // Format price with currency symbol
        function formatPrice(price, currency = 'USD') {
            const numPrice = Number(price) || 0;
            const symbol = currencySymbols[currency] || '$';
            return `${symbol}${numPrice.toFixed(2)}`;
        }

        // Load product
        async function loadProduct() {
            try {
                showLoading();

                const productRef = doc(db, 'products', productId);
                const productSnap = await getDoc(productRef);

                if (!productSnap.exists()) {
                    showError('Product not found');
                    return;
                }

                currentProduct = {
                    id: productSnap.id,
                    ...productSnap.data()
                };

                // Ensure currency field exists (default to USD for backward compatibility)
                currentProduct.currency = currentProduct.currency || 'USD';

                console.log('Product loaded:', currentProduct);

                // Process images
                if (currentProduct.images && currentProduct.images.length > 0) {
                    productImages = currentProduct.images.map(img => getImageUrl(img));
                }

                // Load store info
                if (currentProduct.storeId) {
                    await loadStoreInfo();
                }

                // Load seller info and their other products
                await loadSellerInfo();
                
                // Load seller's other products
                if (currentProduct.ownerId) {
                    await loadSellerProducts();
                }

                // Load related products
                await loadRelatedProducts();

                // Render product
                renderProduct();

            } catch (error) {
                console.error('Error loading product:', error);
                showError('Failed to load product');
            }
        }

        async function loadStoreInfo() {
            try {
                const storeRef = doc(db, 'stores', currentProduct.storeId);
                const storeSnap = await getDoc(storeRef);
                
                if (storeSnap.exists()) {
                    currentProduct.store = storeSnap.data();
                    console.log('Store info loaded:', currentProduct.store);
                }
            } catch (error) {
                console.log('Error loading store info:', error);
            }
        }

        async function loadSellerInfo() {
            try {
                const sellerRef = doc(db, 'users', currentProduct.ownerId);
                const sellerSnap = await getDoc(sellerRef);
                
                if (sellerSnap.exists()) {
                    currentProduct.seller = sellerSnap.data();
                    console.log('Seller info loaded:', currentProduct.seller);
                }
            } catch (error) {
                console.log('Error loading seller info:', error);
            }
        }

        async function loadSellerProducts() {
            try {
                const productsRef = collection(db, 'products');
                const q = query(
                    productsRef,
                    where('ownerId', '==', currentProduct.ownerId),
                    where('status', '==', 'active'),
                    limit(6)
                );
                
                const querySnapshot = await getDocs(q);
                sellerProducts = [];
                
                querySnapshot.forEach((doc) => {
                    if (doc.id !== currentProduct.id) {
                        const product = doc.data();
                        sellerProducts.push({
                            id: doc.id,
                            ...product,
                            currency: product.currency || 'USD',
                            mainImage: product.images && product.images.length > 0 
                                ? getImageUrl(product.images[0])
                                : 'images/default-product.jpg'
                        });
                    }
                });
                
                console.log(`Found ${sellerProducts.length} other products from seller`);
            } catch (error) {
                console.log('Error loading seller products:', error);
            }
        }

        async function loadRelatedProducts() {
            try {
                if (!currentProduct.category) return;
                
                const productsRef = collection(db, 'products');
                const q = query(
                    productsRef,
                    where('category', '==', currentProduct.category),
                    where('status', '==', 'active'),
                    limit(4)
                );
                
                const querySnapshot = await getDocs(q);
                currentProduct.related = [];
                
                querySnapshot.forEach((doc) => {
                    if (doc.id !== currentProduct.id) {
                        const product = doc.data();
                        currentProduct.related.push({
                            id: doc.id,
                            ...product,
                            currency: product.currency || 'USD',
                            mainImage: product.images && product.images.length > 0 
                                ? getImageUrl(product.images[0])
                                : 'images/default-product.jpg'
                        });
                    }
                });
            } catch (error) {
                console.log('Error loading related products:', error);
                currentProduct.related = [];
            }
        }

        function showLoading() {
            productContent.innerHTML = `
                <div class="loading-skeleton">
                    <div class="skeleton-image"></div>
                    <div class="skeleton-text" style="width: 60%;"></div>
                    <div class="skeleton-text" style="width: 40%;"></div>
                    <div class="skeleton-text" style="width: 80%;"></div>
                </div>
            `;
        }

        function showError(message) {
            productContent.innerHTML = `
                <div class="empty-state" style="text-align: center; padding: 60px;">
                    <i class="fas fa-exclamation-circle" style="font-size: 60px; color: var(--danger); margin-bottom: 20px;"></i>
                    <h3>Error</h3>
                    <p style="color: var(--text-secondary); margin-bottom: 20px;">${message}</p>
                    <a href="market.html" class="back-btn" style="display: inline-block;">
                        <i class="fas fa-arrow-left"></i> Back to Marketplace
                    </a>
                </div>
            `;
        }

        function renderProduct() {
            const hasDiscount = currentProduct.discount > 0;
            const inStock = currentProduct.stock === undefined || currentProduct.stock > 0;
            
            // Get product currency
            const productCurrency = currentProduct.currency || 'USD';
            
            // Get prices with proper formatting
            const currentPrice = currentProduct.salePrice || currentProduct.price || 0;
            const originalPrice = currentProduct.originalPrice || currentProduct.price || 0;
            
            // Format prices with currency symbol
            const currentPriceFormatted = formatPrice(currentPrice, productCurrency);
            const originalPriceFormatted = formatPrice(originalPrice, productCurrency);
            
            // Get main image
            const mainImage = productImages.length > 0 ? productImages[0] : 'images/default-product.jpg';

            // Get store info
            const store = currentProduct.store || {};
            const storeName = store.name || store.storeName || currentProduct.storeName || 'Store';
            const storeLogo = getStoreLogo(store);
            const isVerified = store.verified || false;

            // Get seller info
            const seller = currentProduct.seller || {};
            const sellerAvatar = getAvatarUrl(seller);
            const sellerName = seller.displayName || seller.name || currentProduct.ownerName || 'Seller';
            const sellerJoined = seller.createdAt ? new Date(seller.createdAt.seconds * 1000) : new Date();

            productContent.innerHTML = `
                <!-- Product Container -->
                <div class="product-container">
                    <!-- Image Gallery -->
                    <div class="image-gallery">
                        <img src="${mainImage}" alt="${currentProduct.name}" class="main-image" id="mainImage" 
                             onerror="this.src='images/default-product.jpg'">
                        
                        ${productImages.some(img => img.includes('cloudinary.com')) ? `
                            <div class="cloudinary-badge">
                                <i class="fas fa-cloud"></i> Cloudinary
                            </div>
                        ` : ''}
                        
                        ${productImages.length > 1 ? `
                            <div class="thumbnail-container" id="thumbnailContainer">
                                ${productImages.map((img, index) => `
                                    <img src="${img}" alt="Thumbnail ${index + 1}" 
                                         class="thumbnail ${index === 0 ? 'active' : ''}" 
                                         data-index="${index}"
                                         onerror="this.src='images/default-product.jpg'">
                                `).join('')}
                            </div>
                        ` : ''}
                    </div>

                    <!-- Product Info -->
                    <div class="product-info">
                        <!-- Store Info -->
                        <div class="store-info">
                            <img src="${storeLogo}" 
                                 alt="${storeName}" 
                                 class="store-avatar"
                                 onerror="this.src='images/default-store.jpg'">
                            <div class="store-details">
                                <div class="store-name">
                                    <a href="store.html?id=${currentProduct.storeId}">${storeName}</a>
                                    ${isVerified ? '<span class="store-verified">Verified</span>' : ''}
                                </div>
                                <div class="store-rating">
                                    <i class="fas fa-star"></i>
                                    <span>${store.rating || 'New'}</span>
                                </div>
                            </div>
                        </div>

                        <!-- Product Name -->
                        <h1 class="product-name">${currentProduct.name || 'Unnamed Product'}</h1>

                        <!-- Product Meta -->
                        <div class="product-meta">
                            <span><i class="fas fa-tag"></i> ${currentProduct.category?.replace(/-/g, ' ') || 'Uncategorized'}</span>
                            <span><i class="fas fa-eye"></i> ${currentProduct.views || 0} views</span>
                            <span><i class="fas fa-heart"></i> ${currentProduct.likes?.length || 0} likes</span>
                        </div>

                        <!-- Price Section -->
                        <div class="product-price">
                            <div class="price-row">
                                <span class="current-price">${currentPriceFormatted}</span>
                                ${hasDiscount ? `
                                    <span class="original-price">${originalPriceFormatted}</span>
                                    <span class="discount-badge">-${currentProduct.discount}%</span>
                                ` : ''}
                                <span class="currency-badge">${productCurrency}</span>
                            </div>
                            <div class="stock-status">
                                ${inStock ? `
                                    <i class="fas fa-check-circle in-stock"></i>
                                    <span class="in-stock">In Stock</span>
                                    ${currentProduct.stock ? `(${currentProduct.stock} available)` : ''}
                                ` : `
                                    <i class="fas fa-times-circle out-of-stock"></i>
                                    <span class="out-of-stock">Out of Stock</span>
                                `}
                            </div>
                        </div>

                        <!-- Features -->
                        ${currentProduct.features && currentProduct.features.length > 0 ? `
                            <div class="features-section">
                                <div class="features-title">
                                    <i class="fas fa-star"></i> Product Features
                                </div>
                                <div class="features-grid">
                                    ${currentProduct.features.map(feature => `
                                        <span class="feature-item">
                                            <i class="fas fa-check"></i> ${String(feature).replace(/-/g, ' ')}
                                        </span>
                                    `).join('')}
                                </div>
                            </div>
                        ` : ''}

                        <!-- Description -->
                        <div class="description-section">
                            <div class="description-title">
                                <i class="fas fa-align-left"></i> Description
                            </div>
                            <div class="description-text">
                                ${currentProduct.description || 'No description provided.'}
                                ${currentProduct.additionalDetails ? `
                                    <br><br>${currentProduct.additionalDetails}
                                ` : ''}
                            </div>
                        </div>

                        <!-- Contact Seller -->
                        <div class="contact-section">
                            <div class="contact-title">
                                <i class="fas fa-headset"></i> Contact Seller
                            </div>
                            <div class="contact-buttons">
                                ${currentProduct.ownerWhatsapp ? `
                                    <a href="https://wa.me/${currentProduct.ownerWhatsapp.replace(/[^0-9]/g, '')}" 
                                       target="_blank" class="contact-btn whatsapp">
                                        <i class="fab fa-whatsapp"></i> WhatsApp
                                    </a>
                                ` : ''}
                                
                                ${currentProduct.ownerTelegram ? `
                                    <a href="https://t.me/${currentProduct.ownerTelegram.replace('@', '')}" 
                                       target="_blank" class="contact-btn telegram">
                                        <i class="fab fa-telegram"></i> Telegram
                                    </a>
                                ` : ''}
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Seller Information Section -->
                <div class="seller-section">
                    <div class="seller-header">
                        <img src="${sellerAvatar}" 
                             alt="${sellerName}" 
                             class="seller-avatar-large"
                             onerror="this.src='images/default-avatar.jpg'">
                        <div>
                            <div class="seller-name-large">${sellerName}</div>
                            <div class="seller-joined">
                                <i class="fas fa-calendar-alt"></i> 
                                Member since ${sellerJoined.getFullYear()}
                            </div>
                        </div>
                    </div>
                    
                    <div class="seller-stats">
                        <div class="seller-stat">
                            <div class="stat-value">${seller.products || 0}</div>
                            <div class="stat-label">Products</div>
                        </div>
                        <div class="seller-stat">
                            <div class="stat-value">${seller.sales || 0}</div>
                            <div class="stat-label">Sales</div>
                        </div>
                        <div class="seller-stat">
                            <div class="stat-value">${seller.rating || 'New'}</div>
                            <div class="stat-label">Rating</div>
                        </div>
                    </div>

                    <!-- Seller's Other Products Preview -->
                    ${sellerProducts.length > 0 ? `
                        <div class="seller-products-preview">
                            <div class="preview-title">
                                <i class="fas fa-box"></i> More from this seller
                            </div>
                            <div class="preview-grid">
                                ${sellerProducts.slice(0, 3).map(product => {
                                    const productPrice = product.salePrice || product.price || 0;
                                    const productCurrency = product.currency || 'USD';
                                    return `
                                        <div class="preview-item" onclick="window.location.href='product.html?id=${product.id}'">
                                            <img src="${product.mainImage}" 
                                                 alt="${product.name}" 
                                                 class="preview-image"
                                                 onerror="this.src='images/default-product.jpg'">
                                            <div class="preview-name">${product.name}</div>
                                            <div class="preview-price">${formatPrice(productPrice, productCurrency)}</div>
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        </div>
                    ` : ''}

                    <a href="store.html?id=${currentProduct.storeId}" class="view-store-btn">
                        <i class="fas fa-store"></i> Visit Store
                    </a>
                </div>

                <!-- Related Products -->
                ${currentProduct.related && currentProduct.related.length > 0 ? `
                    <div class="related-section">
                        <h2 class="related-title">
                            <i class="fas fa-link"></i> Related Products
                        </h2>
                        <div class="related-grid">
                            ${currentProduct.related.map(product => {
                                const productPrice = product.salePrice || product.price || 0;
                                const productCurrency = product.currency || 'USD';
                                return `
                                    <div class="related-card" onclick="window.location.href='product.html?id=${product.id}'">
                                        <img src="${product.mainImage}" alt="${product.name}" class="related-image"
                                             onerror="this.src='images/default-product.jpg'">
                                        <div class="related-info">
                                            <div class="related-name">${product.name}</div>
                                            <div class="related-price">${formatPrice(productPrice, productCurrency)}</div>
                                        </div>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    </div>
                ` : ''}
            `;

            // Add thumbnail click events
            document.querySelectorAll('.thumbnail').forEach(thumb => {
                thumb.addEventListener('click', () => {
                    const index = parseInt(thumb.dataset.index);
                    currentImageIndex = index;
                    document.getElementById('mainImage').src = productImages[index];
                    
                    document.querySelectorAll('.thumbnail').forEach(t => t.classList.remove('active'));
                    thumb.classList.add('active');
                });
            });

            // Add main image click for modal
            document.getElementById('mainImage').addEventListener('click', () => {
                if (productImages.length > 0) {
                    openModal(currentImageIndex);
                }
            });
        }

        // Modal functions
        function openModal(index) {
            currentImageIndex = index;
            modalImage.src = productImages[index];
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            modal.classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        function nextImage() {
            currentImageIndex = (currentImageIndex + 1) % productImages.length;
            modalImage.src = productImages[currentImageIndex];
        }

        function prevImage() {
            currentImageIndex = (currentImageIndex - 1 + productImages.length) % productImages.length;
            modalImage.src = productImages[currentImageIndex];
        }

        // Modal event listeners
        modalClose.addEventListener('click', closeModal);
        modalNext.addEventListener('click', nextImage);
        modalPrev.addEventListener('click', prevImage);

        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                closeModal();
            }
        });

        document.addEventListener('keydown', (e) => {
            if (!modal.classList.contains('active')) return;
            
            if (e.key === 'Escape') {
                closeModal();
            } else if (e.key === 'ArrowRight') {
                nextImage();
            } else if (e.key === 'ArrowLeft') {
                prevImage();
            }
        });

        // Update back button
        const referrer = document.referrer;
        if (referrer.includes('market.html')) {
            backBtn.href = referrer;
        }
    </script>
</body>
</html>
