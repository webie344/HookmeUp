<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photos - Anonymous Gists</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .photos-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .photos-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .back-btn {
            background: #b3004b;
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(179, 0, 75, 0.3);
        }

        .back-btn:hover {
            transform: translateX(-3px);
            background: #990042;
            box-shadow: 0 8px 20px rgba(179, 0, 75, 0.4);
        }

        .header-title {
            font-size: 24px;
            font-weight: 700;
            color: #b3004b;
        }

        .photos-count {
            background: #b3004b;
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }

        .photos-content {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 20px;
            min-height: 500px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
        }

        .photos-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            padding: 10px;
        }

        .photo-column {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .photo-item {
            position: relative;
            border-radius: 15px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            aspect-ratio: 1;
        }

        .photo-item:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
        }

        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.6s ease;
        }

        .photo-item:hover img {
            transform: scale(1.1);
        }

        .photo-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.7));
            color: white;
            padding: 20px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .photo-item:hover .photo-overlay {
            opacity: 1;
        }

        .loading-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 20px;
            text-align: center;
        }

        .loading-spinner {
            margin-bottom: 20px;
            color: #b3004b;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 20px;
            text-align: center;
        }

        .empty-state i {
            color: #b3004b;
            margin-bottom: 20px;
            opacity: 0.7;
        }

        .empty-state h3 {
            font-size: 24px;
            font-weight: 700;
            color: #333;
            margin-bottom: 10px;
        }

        .empty-state p {
            color: #666;
            font-size: 16px;
            margin-bottom: 30px;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .photos-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }
            
            .photos-header {
                padding: 15px;
                margin-bottom: 20px;
            }
            
            .header-title {
                font-size: 20px;
            }
            
            .photos-content {
                padding: 15px;
            }
        }

        @media (max-width: 480px) {
            .photos-grid {
                grid-template-columns: 1fr;
            }
            
            .photos-header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
            
            .header-left {
                justify-content: center;
            }
        }

        /* Animation */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .photo-item {
            animation: fadeIn 0.6s ease forwards;
        }

        .photo-item:nth-child(odd) {
            animation-delay: 0.1s;
        }

        .photo-item:nth-child(even) {
            animation-delay: 0.2s;
        }
    </style>
</head>
<body>
    <div class="photos-container">
        <div class="photos-header">
            <div class="header-left">
                <button id="backBtn" class="back-btn">
                    <i class="fas fa-arrow-left"></i>
                </button>
                <div class="header-title">
                    <i class="fas fa-images"></i> Photos
                </div>
            </div>
            <div id="photosCount" class="photos-count">
                Loading...
            </div>
        </div>
        
        <div class="photos-content">
            <div id="photosContainer"></div>
        </div>
    </div>

    <script type="module" src="gists.js"></script>
</body>
</html>
