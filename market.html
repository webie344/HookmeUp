<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Marketplace — Bondbase</title>
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* RESET & BASE */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #14141f;
            --bg-card: #1a1a2a;
            --text-primary: #ffffff;
            --text-secondary: #b0b0c0;
            --primary: #ff2a6d;
            --primary-dark: #d91a5c;
            --secondary: #7a4fff;
            --success: #00ff88;
            --warning: #ffd166;
            --danger: #ff6b6b;
            --border: #2a2a3a;
            --input-bg: #1e1e2e;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* MAIN CONTAINER */
        .container {
            max-width: 1400px;
            margin: 30px auto;
            padding: 0 30px;
        }

        /* Search & filters */
        .search-section {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid var(--border);
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .search-input {
            flex: 1;
            padding: 12px 20px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 16px;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .filter-btn {
            padding: 12px 24px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .filter-btn:hover, .filter-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .categories {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .category-tag {
            padding: 8px 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 25px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        .category-tag:hover, .category-tag.active {
            background: var(--secondary);
            color: white;
            border-color: var(--secondary);
        }

        /* PRODUCT GRID */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .product-card {
            background: var(--bg-card);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border);
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(255, 42, 109, 0.2);
            border-color: var(--primary);
        }

        .product-image {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            background: var(--bg-secondary);
        }

        .product-badge {
            position: absolute;
            top: 6px;
            right: 6px;
            background: var(--primary);
            color: white;
            padding: 3px 6px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: 600;
            z-index: 2;
        }

        .product-discount {
            position: absolute;
            top: 6px;
            left: 6px;
            background: var(--success);
            color: black;
            padding: 3px 6px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: 600;
            z-index: 2;
        }

        .product-info {
            padding: 12px 10px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .product-store {
            font-size: 10px;
            color: var(--text-secondary);
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .product-store i {
            color: var(--primary);
        }

        .product-name {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--text-primary);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.3;
        }

        .product-price {
            margin-bottom: 8px;
        }

        .current-price {
            font-size: 16px;
            font-weight: 700;
            color: var(--primary);
        }

        .original-price {
            font-size: 11px;
            color: var(--text-secondary);
            text-decoration: line-through;
            margin-left: 5px;
        }

        .product-currency {
            display: inline-block;
            background: var(--bg-secondary);
            padding: 2px 6px;
            border-radius: 8px;
            font-size: 9px;
            color: var(--text-secondary);
            margin-left: 5px;
        }

        .product-features {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-bottom: 10px;
        }

        .feature-tag {
            background: var(--bg-secondary);
            padding: 3px 6px;
            border-radius: 10px;
            font-size: 9px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 3px;
        }

        .feature-tag i {
            color: var(--primary);
            font-size: 8px;
        }

        .product-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-top: 1px solid var(--border);
            padding-top: 10px;
            margin-top: auto;
        }

        .seller-info {
            display: flex;
            align-items: center;
            gap: 5px;
            min-width: 0;
        }

        .seller-avatar {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--bg-secondary);
            object-fit: cover;
            flex-shrink: 0;
        }

        .seller-name {
            font-size: 10px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .connect-btn {
            background: linear-gradient(135deg, #25D366, #128C7E);
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 16px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            transition: all 0.2s ease;
            text-decoration: none;
            white-space: nowrap;
        }

        .connect-btn i {
            font-size: 11px;
        }

        .connect-btn.telegram {
            background: linear-gradient(135deg, #0088cc, #0077b5);
        }

        .connect-btn:hover {
            transform: scale(1.05);
        }

        /* loading / empty states */
        .loading-skeleton {
            background: var(--bg-card);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .skeleton-image {
            width: 100%;
            aspect-ratio: 1/1;
            background: linear-gradient(90deg, var(--bg-secondary) 25%, var(--bg-card) 50%, var(--bg-secondary) 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }

        .skeleton-text {
            height: 14px;
            background: var(--bg-secondary);
            margin: 10px;
            border-radius: 4px;
            animation: loading 1.5s infinite;
        }

        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid var(--border);
            grid-column: 1 / -1;
        }

        .empty-state i {
            font-size: 50px;
            color: var(--primary);
            margin-bottom: 15px;
        }

        .empty-state h3 {
            font-size: 20px;
            margin-bottom: 8px;
        }

        .empty-state p {
            color: var(--text-secondary);
            margin-bottom: 15px;
            font-size: 14px;
        }

        .empty-btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 10px 24px;
            border-radius: 25px;
            text-decoration: none;
            display: inline-block;
            font-weight: 600;
            font-size: 14px;
        }

        .offline-indicator {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--danger);
            color: white;
            padding: 10px 18px;
            border-radius: 40px;
            display: none;
            align-items: center;
            gap: 8px;
            z-index: 1000;
            font-size: 13px;
        }

        /* mobile fine-tuning */
        @media (max-width: 480px) {
            .container {
                padding: 0 12px;
            }
            .search-box {
                flex-direction: column;
            }
            .filter-btn {
                width: 100%;
                text-align: center;
            }
            .products-grid {
                gap: 10px;
            }
            .product-info {
                padding: 8px 6px;
            }
            .current-price {
                font-size: 14px;
            }
            .seller-name {
                max-width: 50px;
            }
        }

        /* for 280px (Galaxy Fold) — force 2 columns */
        @media (max-width: 320px) {
            .products-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <!-- Main container -->
    <div class="container">
        <!-- Search and filters -->
        <div class="search-section">
            <div class="search-box">
                <input type="text" class="search-input" id="searchInput" placeholder="Search products...">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="new">New</button>
                <button class="filter-btn" data-filter="discount">On Sale</button>
            </div>
            <div class="categories" id="categories">
                <span class="category-tag active" data-category="all">All</span>
                <span class="category-tag" data-category="Equipments">Equipments</span>
                <span class="category-tag" data-category="Groceries">Groceries</span>
                <span class="category-tag" data-category="online Services">online Services</span>
                <span class="category-tag" data-category="social Accounts">social Accounts</span>
                <span class="category-tag" data-category="Food&catering">Food&catering</span>
            </div>
        </div>

        <!-- Products Grid -->
        <div class="products-grid" id="productsGrid"></div>
    </div>

    <!-- Offline Indicator -->
    <div class="offline-indicator" id="offlineIndicator">
        <i class="fas fa-wifi-slash"></i> You are offline. Showing cached.
    </div>

    <!-- Firebase Scripts -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, getDocs, getDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC9jF-ocy6HjsVzWVVlAyXW-4aIFgA79-A",
            authDomain: "crypto-6517d.firebaseapp.com",
            projectId: "crypto-6517d",
            storageBucket: "crypto-6517d.firebasestorage.app",
            messagingSenderId: "60263975159",
            appId: "1:60263975159:web:bd53dcaad86d6ed9592bf2"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Elements
        const productsGrid = document.getElementById('productsGrid');
        const searchInput = document.getElementById('searchInput');
        const filterBtns = document.querySelectorAll('.filter-btn');
        const categoryTags = document.querySelectorAll('.category-tag');
        const offlineIndicator = document.getElementById('offlineIndicator');

        let allProducts = [];
        let filteredProducts = [];
        let currentFilter = 'all';
        let currentCategory = 'all';
        let isOnline = navigator.onLine;

        // Cache for seller data to avoid repeated fetches
        const sellerCache = new Map();

        // Currency symbols mapping
        const currencySymbols = {
            USD: '$',
            NGN: '₦',
            GBP: '£'
        };

        // Helper function to get image URL from various formats
        function getImageUrl(image) {
            if (!image) return 'images/default-product.jpg';
            
            if (typeof image === 'string') {
                if (image.startsWith('http') || image.startsWith('/') || image.startsWith('./')) {
                    return image;
                }
                return 'images/default-product.jpg';
            }
            
            if (typeof image === 'object') {
                if (image.thumbnail) return image.thumbnail;
                if (image.url) return image.url;
                if (image.secure_url) return image.secure_url;
            }
            
            return 'images/default-product.jpg';
        }

        // Helper function to get avatar URL from user data
        function getAvatarUrl(userData) {
            if (!userData) return 'images/default-avatar.jpg';
            
            // Try different possible avatar fields
            if (userData.photoURL) return userData.photoURL;
            if (userData.avatar) return userData.avatar;
            if (userData.profilePicture) return userData.profilePicture;
            if (userData.profileImage) return userData.profileImage;
            if (userData.photoUrl) return userData.photoUrl;
            
            // Check if there's a photo in the user object
            if (userData.photo && typeof userData.photo === 'string') return userData.photo;
            if (userData.photo && userData.photo.url) return userData.photo.url;
            
            return 'images/default-avatar.jpg';
        }

        // Format price with the product's own currency symbol
        function formatPrice(price, currency = 'USD') {
            const numPrice = Number(price) || 0;
            const symbol = currencySymbols[currency] || '$';
            return `${symbol}${numPrice.toFixed(2)}`;
        }

        // Fetch seller data for a product
        async function fetchSellerData(ownerId) {
            if (!ownerId) return null;
            
            // Check cache first
            if (sellerCache.has(ownerId)) {
                return sellerCache.get(ownerId);
            }
            
            try {
                const userRef = doc(db, 'users', ownerId);
                const userSnap = await getDoc(userRef);
                
                if (userSnap.exists()) {
                    const userData = userSnap.data();
                    sellerCache.set(ownerId, userData);
                    return userData;
                }
            } catch (error) {
                console.log('Error fetching seller data:', error);
            }
            
            return null;
        }

        // Network monitoring
        window.addEventListener('online', () => {
            isOnline = true;
            offlineIndicator.style.display = 'none';
            loadProducts(true);
        });
        
        window.addEventListener('offline', () => {
            isOnline = false;
            offlineIndicator.style.display = 'flex';
            loadCachedProducts();
        });

        // Load products
        async function loadProducts(forceRefresh = false) {
            if (!isOnline && !forceRefresh) {
                loadCachedProducts();
                return;
            }
            
            try {
                showLoading();
                
                const productsRef = collection(db, 'products');
                const snapshot = await getDocs(productsRef);
                
                // Process each product and fetch seller data
                const productPromises = snapshot.docs.map(async (doc) => {
                    const data = doc.data();
                    
                    // Process images
                    let processedImages = [];
                    if (data.images && Array.isArray(data.images)) {
                        processedImages = data.images.map(img => getImageUrl(img));
                    }
                    
                    // Fetch seller data
                    const sellerData = await fetchSellerData(data.ownerId);
                    
                    return {
                        id: doc.id,
                        ...data,
                        processedImages: processedImages,
                        mainImage: processedImages.length > 0 ? processedImages[0] : 'images/default-product.jpg',
                        seller: sellerData,
                        avatarUrl: getAvatarUrl(sellerData),
                        // Ensure currency field exists (default to USD for backward compatibility)
                        currency: data.currency || 'USD'
                    };
                });
                
                // Wait for all seller data to load
                allProducts = await Promise.all(productPromises);

                // Sort in memory by createdAt (newest first)
                allProducts.sort((a, b) => {
                    const dateA = a.createdAt?.seconds || 0;
                    const dateB = b.createdAt?.seconds || 0;
                    return dateB - dateA;
                });

                console.log(`Loaded ${allProducts.length} products with seller data and currency info`);
                cacheProducts(allProducts);
                filterAndDisplay();
                
            } catch (err) {
                console.warn('Error loading products:', err);
                loadCachedProducts();
            }
        }

        function cacheProducts(products) {
            try {
                localStorage.setItem('cached_products', JSON.stringify({ 
                    data: products, 
                    timestamp: Date.now() 
                }));
            } catch (e) {
                console.log('Cache error:', e);
            }
        }

        function loadCachedProducts() {
            try {
                const cached = localStorage.getItem('cached_products');
                if (cached) {
                    const { data } = JSON.parse(cached);
                    allProducts = data;
                    filterAndDisplay();
                    if (!isOnline) offlineIndicator.style.display = 'flex';
                } else {
                    showEmptyState();
                }
            } catch (e) {
                console.log('Cache load error:', e);
                showEmptyState();
            }
        }

        function showLoading() {
            productsGrid.innerHTML = '';
            for (let i = 0; i < 6; i++) {
                productsGrid.innerHTML += `
                    <div class="loading-skeleton">
                        <div class="skeleton-image"></div>
                        <div class="skeleton-text" style="width:80%"></div>
                        <div class="skeleton-text" style="width:60%"></div>
                    </div>
                `;
            }
        }

        function showEmptyState() {
            productsGrid.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-box-open"></i>
                    <h3>No Products Yet</h3>
                    <p>Be the first to list a product!</p>
                    <a href="create-store.html" class="empty-btn"><i class="fas fa-store"></i> Open a Store</a>
                </div>
            `;
        }

        function filterAndDisplay() {
            let filtered = [...allProducts];
            
            // Filter by category
            if (currentCategory !== 'all') {
                filtered = filtered.filter(p => p.category === currentCategory);
            }
            
            // Filter by special filters
            if (currentFilter === 'new') {
                const oneWeekAgo = Date.now() - (7 * 24 * 60 * 60 * 1000);
                filtered = filtered.filter(p => {
                    const created = p.createdAt?.seconds ? p.createdAt.seconds * 1000 : 0;
                    return created > oneWeekAgo;
                });
            } else if (currentFilter === 'discount') {
                filtered = filtered.filter(p => p.discount > 0);
            }

            // Search filter
            const term = searchInput.value.toLowerCase().trim();
            if (term) {
                filtered = filtered.filter(p => 
                    (p.name && p.name.toLowerCase().includes(term)) ||
                    (p.description && p.description.toLowerCase().includes(term)) ||
                    (p.storeName && p.storeName.toLowerCase().includes(term))
                );
            }
            
            filteredProducts = filtered;
            displayProducts();
        }

        function displayProducts() {
            if (!filteredProducts.length) {
                productsGrid.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-search"></i>
                        <h3>No products found</h3>
                        <p>Try another search or category</p>
                    </div>
                `;
                return;
            }

            productsGrid.innerHTML = filteredProducts.map(p => createProductCard(p)).join('');

            // Attach events
            document.querySelectorAll('.product-card').forEach(card => {
                card.addEventListener('click', (e) => {
                    if (!e.target.closest('.connect-btn')) {
                        window.location.href = `product.html?id=${card.dataset.productId}`;
                    }
                });
            });
            
            document.querySelectorAll('.connect-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const whatsapp = btn.dataset.whatsapp;
                    const telegram = btn.dataset.telegram;
                    if (btn.classList.contains('telegram') && telegram) {
                        window.open(`https://t.me/${telegram.replace('@', '')}`, '_blank');
                    } else if (whatsapp) {
                        window.open(`https://wa.me/${whatsapp.replace(/[^0-9]/g, '')}`, '_blank');
                    }
                });
            });
        }

        function createProductCard(product) {
            const hasDiscount = product.discount > 0;
            const price = product.salePrice || product.price || 0;
            const originalPrice = product.originalPrice || price;
            
            // Get product image
            const imageUrl = product.mainImage || 'images/default-product.jpg';
            
            // Get seller avatar
            const avatarUrl = product.avatarUrl || 'images/default-avatar.jpg';
            
            // Get seller name
            const sellerName = product.seller?.displayName || 
                              product.seller?.username || 
                              product.seller?.name || 
                              product.ownerName || 
                              'Seller';

            // Get product currency (default to USD for backward compatibility)
            const productCurrency = product.currency || 'USD';

            // Format prices with the product's own currency
            const currentPriceFormatted = formatPrice(price, productCurrency);
            const originalPriceFormatted = hasDiscount ? formatPrice(originalPrice, productCurrency) : '';

            return `
                <div class="product-card" data-product-id="${product.id}">
                    <img src="${imageUrl}" 
                         alt="${product.name || 'Product'}" 
                         class="product-image" 
                         onerror="this.src='images/default-product.jpg'">
                    
                    ${product.status === 'new' ? '<span class="product-badge">NEW</span>' : ''}
                    ${hasDiscount ? `<span class="product-discount">-${product.discount}%</span>` : ''}
                    
                    <div class="product-info">
                        <div class="product-store">
                            <i class="fas fa-store"></i> 
                            ${product.storeName || 'Store'}
                        </div>
                        
                        <h3 class="product-name">${product.name || 'Product'}</h3>
                        
                        <div class="product-price">
                            <span class="current-price">${currentPriceFormatted}</span>
                            ${hasDiscount ? `<span class="original-price">${originalPriceFormatted}</span>` : ''}
                            <span class="product-currency">${productCurrency}</span>
                        </div>
                        
                        ${product.features && product.features.length ? `
                            <div class="product-features">
                                ${product.features.slice(0, 2).map(f => `
                                    <span class="feature-tag">
                                        <i class="fas fa-check"></i>${String(f).substring(0, 8)}
                                    </span>
                                `).join('')}
                            </div>
                        ` : ''}
                        
                        <div class="product-footer">
                            <div class="seller-info">
                                <img src="${avatarUrl}" 
                                     class="seller-avatar" 
                                     onerror="this.src='images/default-avatar.jpg'">
                                <span class="seller-name">${sellerName}</span>
                            </div>
                            
                            <div style="display:flex; gap:4px;">
                                ${product.ownerWhatsapp ? `
                                    <button class="connect-btn" data-whatsapp="${product.ownerWhatsapp}">
                                        <i class="fab fa-whatsapp"></i>
                                    </button>
                                ` : ''}
                                
                                ${product.ownerTelegram ? `
                                    <button class="connect-btn telegram" data-telegram="${product.ownerTelegram}">
                                        <i class="fab fa-telegram"></i>
                                    </button>
                                ` : ''}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // Event listeners
        searchInput.addEventListener('input', debounce(filterAndDisplay, 300));
        
        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                filterBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                filterAndDisplay();
            });
        });
        
        categoryTags.forEach(tag => {
            tag.addEventListener('click', () => {
                categoryTags.forEach(t => t.classList.remove('active'));
                tag.classList.add('active');
                currentCategory = tag.dataset.category;
                filterAndDisplay();
            });
        });

        function debounce(fn, delay) {
            let timer;
            return (...args) => {
                clearTimeout(timer);
                timer = setTimeout(() => fn(...args), delay);
            };
        }

        // Initial load
        loadProducts();
    </script>
</body>
</html>
